name: backend-ci

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check
        run: python -m compileall app

      - name: Verify important backend files exist
        run: |
          test -f app/main.py
          test -f app/inference.py
          test -f Dockerfile
          test -f start.sh
          test -f fastapi_artifacts/class_names.json
          test -f fastapi_artifacts/inference_config.json

      - name: Docker build check
        run: docker build -t lemon-backend .